{% extends "base.html" %}

{% block content %}
<div class="form-container" style="max-width: 700px;">
    <h2 style="margin-bottom: 30px;">Мой профиль</h2>

    <form method="post">
        {% csrf_token %}
        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Имя</label>
                <input type="text" name="first_name" value="{{ user.first_name }}">
            </div>
            <div class="form-group">
                <label class="form-label">Фамилия</label>
                <input type="text" name="last_name" value="{{ user.last_name }}">
            </div>
        </div>

        <div class="grid-2">
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" name="email" value="{{ user.email }}">
            </div>
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="text" name="phone" value="{{ user.phone|default:'' }}">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Адрес доставки</label>
            <textarea name="address" rows="3" style="resize: none;">{{ user.address|default:'' }}</textarea>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 20px;">
            <button type="submit" class="btn">Сохранить изменения</button>
            <a href="{% url 'accounts:logout' %}" class="btn" style="background: var(--secondary-color); color: var(--text-color) !important;">Выйти</a>
        </div>
    </form>
</div>

<div class="container" style="max-width: 700px; margin-top: 40px;">
    <h3>История заказов</h3>
    <div style="background: white; border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; text-align: center; color: #888;">
        {% if orders %}
            {% else %}
            <p>У вас пока нет совершенных заказов.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
