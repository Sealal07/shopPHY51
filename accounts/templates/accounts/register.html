{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2 style="text-align: center; margin-bottom: 30px;">Регистрация</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color: var(--error-color); font-size: 12px; margin-top: 5px;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Создать аккаунт</button>
    </form>

    <p style="text-align: center; margin-top: 25px; font-size: 14px;">
        Уже есть профиль? <a href="{% url 'accounts:login' %}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Войти</a>
    </p>
</div>
{% endblock %}
