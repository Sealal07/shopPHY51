{% extends "base.html" %}
{% block content %}
<h1 style="margin-bottom: 30px;">Категории десертов</h1>
<div class="product-grid">
    {% for cat in categories %}
        <a href="{{ cat.get_absolute_url }}" class="category-card">
            <div class="category-icon">
               🍰
            </div>
            <div>
                <h3 style="margin: 0;">{{ cat.name }}</h3>
                <p style="font-size: 0.85rem; color: #666; margin: 5px 0;">{{ cat.products.count }} товаров</p>
            </div>
        </a>
    {% empty %}
        <p>Категории скоро появятся!</p>
    {% endfor %}
</div>
{% endblock %}
